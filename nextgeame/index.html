<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A 2D map exploration game with a movable character dot." />
  <title>2D Map Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>🗺️ 2D Map Explorer</h1>
      <p class="subtitle">Use <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or <kbd>Arrow Keys</kbd> to move</p>
    </header>

    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
        <span class="minimap-label">Minimap</span>
      </div>
    </div>

    <footer id="hud">
      <div class="hud-item" id="hud-position">
        <span class="hud-label">Position</span>
        <span class="hud-value" id="pos-display">0, 0</span>
      </div>
      <div class="hud-item" id="hud-tile">
        <span class="hud-label">Tile</span>
        <span class="hud-value" id="tile-display">Grass</span>
      </div>
      <div class="hud-item" id="hud-speed">
        <span class="hud-label">Speed</span>
        <span class="hud-value" id="speed-display">Normal</span>
      </div>
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
